# =============================================================================
# nf-core/rnaseq v3.23.0 — Parameters for Human GRCh38
# Full parameter reference: https://nf-co.re/rnaseq/3.23.0/parameters
# Citation: 10.5281/zenodo.1400710
#
# Project: __PROJECT_ID__
# PI: __PI_NAME__
# Analyst: __ANALYST__
# Date: __DATE__
#
# INSTRUCTIONS:
#   1. This file was auto-generated by init_project.sh
#   2. Review each section and uncomment/edit as needed
#   3. Launch with:
#      nextflow run <pipeline> -params-file params.yaml \
#          -profile singularity \
#          -c configs/institutional/slurm_hpc.config \
#          -c configs/institutional/genomes.config
#
# The pipeline takes a samplesheet with FASTQ files as input, performs
# quality control, trimming and alignment, and produces a gene expression
# matrix and extensive QC report.
# =============================================================================


# =====================================================================
# INPUT / OUTPUT
# =====================================================================

# Path to samplesheet CSV file.
# Each row represents a fastq file (single-end) or a pair of fastq files
# (paired end). Rows with the same sample identifier are considered
# technical replicates and merged automatically [1].
# The strandedness refers to the library preparation and will be
# automatically inferred if set to auto [1].
input: "samplesheet.csv"

# Output directory for all results
outdir: "results"


# =====================================================================
# REFERENCE GENOME
#
# Human GRCh38 with GENCODE v44 annotation.
#
# For the first run without pre-built indices:
#   - Provide fasta and gtf only
#   - The pipeline will build STAR and Salmon indices automatically
#   - Enable save_reference: true to save indices for future reuse
#
# For subsequent runs:
#   - Uncomment the star_index and salmon_index lines below
#   - This skips index building and saves significant time
# =====================================================================

# Genome FASTA sequence
fasta: "/home/ja581385/genomics_core/references/genomes/GRCh38/GRCh38.primary_assembly.genome.fa"

# Gene annotation in GTF format
gtf: "/home/ja581385/genomics_core/references/genomes/GRCh38/gencode.v44.primary_assembly.annotation.gtf"

# Gene BED file for RSeQC (optional — pipeline generates from GTF if not provided)
# gene_bed: "/home/ja581385/genomics_core/references/genomes/GRCh38/gencode.v44.annotation.bed"

# Transcript FASTA (optional — pipeline generates from genome + GTF if not provided)
# transcript_fasta: "/home/ja581385/genomics_core/references/genomes/GRCh38/gencode.v44.transcripts.fa"

# Additional FASTA sequences to include (e.g., ERCC spike-ins)
# additional_fasta: "/path/to/ercc.fa"

# Pre-built indices — UNCOMMENT after building or after first run with save_reference: true
# STAR index requires ~38 GB RAM and ~30 GB disk for human genome [2]
star_index: "/home/ja581385/genomics_core/references/indices/star/GRCh38"
salmon_index: "/home/ja581385/genomics_core/references/indices/salmon/GRCh38"
# rsem_index: "/home/ja581385/genomics_core/references/indices/rsem/GRCh38"
# hisat2_index: "/home/ja581385/genomics_core/references/indices/hisat2/GRCh38"

# Set to true when using GENCODE annotations
# Properly handles transcript IDs with version suffixes (e.g., ENST00000456328.2)
gencode: true


# =====================================================================
# ALIGNMENT STRATEGY
#
# The pipeline supports multiple alignment and quantification routes [1]:
#
#   star_salmon  — STAR alignment + Salmon quantification (RECOMMENDED)
#                  Best balance of accuracy and speed for most RNA-seq.
#                  STAR requires ~38 GB RAM for human genome [2].
#
#   star_rsem    — STAR alignment + RSEM quantification
#                  Produces both gene-level and isoform-level counts.
#                  Uses ENCODE3 STAR settings automatically.
#
#   hisat2       — HiSAT2 alignment, NO QUANTIFICATION [1]
#                  Much lower memory requirement (~8 GB).
#                  WARNING: Quantification is NOT performed with hisat2
#                  due to the lack of an appropriate option to calculate
#                  accurate expression estimates from HISAT2 derived
#                  genomic alignments [1].
# =====================================================================

aligner: "star_salmon"

# Extra arguments passed directly to STAR during alignment (optional)
# Example: limit BAM sorting memory for nodes with less RAM
# extra_star_align_args: '--limitBAMsortRAM 20000000000'

# Extra arguments passed directly to Salmon during quantification (optional)
# extra_salmon_quant_args: ''


# =====================================================================
# PSEUDO-ALIGNMENT (OPTIONAL)
#
# Runs IN ADDITION to the primary aligner specified above [1].
# Provides fast alignment-free quantification.
# Options: salmon, kallisto
# =====================================================================

# pseudo_aligner: "salmon"
# extra_kallisto_quant_args: ''


# =====================================================================
# TRIMMING
#
# Adapter and quality trimming with Trim Galore! [1]
# Enabled by default. Disable with skip_trimming: true
# =====================================================================

# Disable trimming entirely (not recommended for most experiments)
# skip_trimming: true

# Minimum number of trimmed reads required per sample.
# Samples below this threshold are excluded from downstream analysis.
min_trimmed_reads: 10000

# Extra arguments passed to Trim Galore (optional)
# Example: stricter quality threshold and minimum read length
# extra_trimgalore_args: '--quality 25 --length 35'

# Hard-clip a fixed number of bases from reads before adapter detection (optional)
# Useful for removing technical sequences (e.g., SMART-seq2 template switch oligo)
# clip_r1: 0
# clip_r2: 0
# three_prime_clip_r1: 0
# three_prime_clip_r2: 0


# =====================================================================
# rRNA REMOVAL (OPTIONAL)
#
# Removal of ribosomal RNA reads with SortMeRNA [1].
# RECOMMENDED for: total RNA / ribosomal depletion libraries.
# NOT NEEDED for: polyA-selected (mRNA) libraries.
# =====================================================================

# Enable rRNA removal
# remove_ribo_rna: true

# Choose rRNA removal tool: sortmerna (default) or ribodetector
# ribodetector uses a neural network model as an alternative approach
# ribo_removal_tool: "sortmerna"


# =====================================================================
# CONTAMINATION SCREENING (OPTIONAL)
#
# Contamination detection on unaligned sequences [1].
# Kraken2 runs on reads that did NOT map to the reference genome.
# Results appear in the MultiQC report.
#
# Database requirements:
#   Standard database: ~60-72 GB RAM
#   MiniKraken/PlusPF-8: ~8 GB RAM (sufficient for screening)
# =====================================================================

# Path to Kraken2 database directory — uncomment to enable
kraken2_db: "/home/ja581385/genomics_core/references/kraken2/k2_standard"

# Disable Kraken2 even if database path is provided
# skip_kraken2: true


# =====================================================================
# CONTAMINANT REMOVAL (OPTIONAL)
#
# Removal of genome contaminants with BBSplit [1].
# Removes reads mapping to specified contaminant genomes
# (e.g., PhiX, mycoplasma, E. coli in co-culture experiments).
# =====================================================================

# Path to a text file listing contaminant FASTA files
# bbsplit_fasta_list: "/path/to/bbsplit_fasta_list.txt"

# Skip BBSplit contaminant removal
# skip_bbsplit: true


# =====================================================================
# UMI OPTIONS (UNCOMMENT ONLY FOR UMI LIBRARIES)
#
# UMI extraction with UMI-tools before alignment,
# and UMI-based deduplication after alignment [1].
# =====================================================================

# with_umi: true
# umitools_extract_method: "string"
# umitools_bc_pattern: "NNNNNN"
# umi_discard_read: 0
# umitools_dedup_stats: true


# =====================================================================
# STRANDEDNESS
#
# Controlled per-sample in the samplesheet (strandedness column) [2].
# 'auto' is recommended — the pipeline auto-infers strandedness by
# subsampling and pseudoalignment with fq and Salmon [1].
#
# Valid values: auto, forward, reverse, unstranded
#
# The seq_platform column in the samplesheet is optional; for a single
# platform across all samples, use the --seq_platform parameter [1].
# =====================================================================

# seq_platform: "ILLUMINA"


# =====================================================================
# QC MODULE CONTROL
#
# By default ALL quality control modules are enabled.
# The pipeline performs extensive quality control [1]:
#   - Read QC (FastQC)
#   - Alignment QC (RSeQC, Qualimap, dupRadar, Preseq)
#   - Duplicate marking (picard MarkDuplicates)
#   - Sample similarity (DESeq2 PCA)
#   - Coverage tracks (bigWig)
#   - Transcript assembly (StringTie)
#   - Aggregated report (MultiQC)
#
# Uncomment any line below to SKIP that specific QC step.
# =====================================================================

# ---- Pre-alignment QC ----
# skip_fastqc: true

# ---- Post-alignment QC ----
# skip_rseqc: true
# skip_qualimap: true
# skip_dupradar: true
# skip_preseq: true
# skip_markduplicates: true
# skip_deseq2_qc: true

# ---- Coverage and assembly ----
# skip_bigwig: true
# skip_stringtie: true

# ---- Final aggregated report ----
# skip_multiqc: true


# =====================================================================
# OUTPUT OPTIONS
# =====================================================================

# Save intermediate alignment BAM files (before deduplication)
# Useful for troubleshooting and custom downstream analyses
save_align_intermeds: true

# Save pipeline-generated reference files (STAR index, Salmon index, BED, etc.)
# IMPORTANT: Enable on the FIRST run for each new genome build
# to save built indices for reuse in future projects
# save_reference: true

# Save unaligned reads as FASTQ files
# Useful for contamination analysis or custom downstream processing
# save_unaligned: true

# The pipeline supports a two-step reprocessing workflow using BAM files
# from previous runs. Run initially with save_align_intermeds to generate
# BAMs, then reprocess with --skip_alignment for efficient downstream
# analysis without repeating expensive alignment steps [1].
# skip_alignment: false


# =====================================================================
# MULTIQC REPORT
#
# MultiQC aggregates all QC metrics from every pipeline step into a
# single interactive HTML report [1].
# =====================================================================

multiqc_title: "RNA-seq QC Report - __PROJECT_ID__"

# Custom MultiQC configuration file for branding and customization (optional)
# Uncomment to use the project-specific multiqc_config.yaml
# multiqc_config: "multiqc_config.yaml"
