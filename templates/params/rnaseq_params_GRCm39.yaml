# =============================================================================
# nf-core/rnaseq v3.23.0 — Parameters for Mouse GRCm39
# Full parameter reference: https://nf-co.re/rnaseq/3.23.0/parameters
# Citation: 10.5281/zenodo.1400710
#
# Project: __PROJECT_ID__
# PI: __PI_NAME__
# Analyst: __ANALYST__
# Date: __DATE__
#
# Same structure as GRCh38 template with mouse-specific reference paths.
# See rnaseq_params_GRCh38.yaml for detailed comments on each parameter.
# =============================================================================


# =====================================================================
# INPUT / OUTPUT
# =====================================================================

# Samplesheet CSV — each row is a FASTQ file or pair of FASTQ files [1].
# Rows with the same sample identifier are merged as technical replicates [1].
input: "samplesheet.csv"

# Output directory
outdir: "results"


# =====================================================================
# REFERENCE GENOME — Mouse GRCm39 (GENCODE vM33)
# =====================================================================

# Genome FASTA
fasta: "/home/ja581385/genomics_core/references/genomes/GRCm39/GRCm39.primary_assembly.genome.fa"

# Gene annotation GTF
gtf: "/home/ja581385/genomics_core/references/genomes/GRCm39/gencode.vM33.primary_assembly.annotation.gtf"

# Gene BED for RSeQC (optional — generated from GTF if not provided)
# gene_bed: "/home/ja581385/genomics_core/references/genomes/GRCm39/gencode.vM33.annotation.bed"

# Transcript FASTA (optional — generated from genome + GTF if not provided)
# transcript_fasta: "/home/ja581385/genomics_core/references/genomes/GRCm39/gencode.vM33.transcripts.fa"

# Additional FASTA (e.g., ERCC spike-ins)
# additional_fasta: "/path/to/ercc.fa"

# Pre-built indices — uncomment after building or first run with save_reference: true
star_index: "/home/ja581385/genomics_core/references/indices/star/GRCm39"
salmon_index: "/home/ja581385/genomics_core/references/indices/salmon/GRCm39"
# rsem_index: "/home/ja581385/genomics_core/references/indices/rsem/GRCm39"

# GENCODE annotation — handles versioned transcript IDs
gencode: true


# =====================================================================
# ALIGNMENT STRATEGY
#
# Options: star_salmon (recommended), star_rsem, hisat2 [1]
# WARNING: Quantification is NOT performed with hisat2 [1]
# STAR requires ~32 GB RAM for mouse genome [2]
# =====================================================================

aligner: "star_salmon"

# extra_star_align_args: ''
# extra_salmon_quant_args: ''


# =====================================================================
# PSEUDO-ALIGNMENT (OPTIONAL)
# Runs in addition to the primary aligner [1]
# =====================================================================

# pseudo_aligner: "salmon"
# extra_kallisto_quant_args: ''


# =====================================================================
# TRIMMING
# Adapter and quality trimming with Trim Galore! [1]
# =====================================================================

# skip_trimming: true
min_trimmed_reads: 10000
# extra_trimgalore_args: '--quality 25 --length 35'
# clip_r1: 0
# clip_r2: 0
# three_prime_clip_r1: 0
# three_prime_clip_r2: 0


# =====================================================================
# rRNA REMOVAL (OPTIONAL)
# Enable for total RNA / ribosomal depletion libraries [1]
# Not needed for polyA-selected (mRNA) libraries
# =====================================================================

# remove_ribo_rna: true
# ribo_removal_tool: "sortmerna"


# =====================================================================
# CONTAMINATION SCREENING (OPTIONAL)
# Kraken2 runs on unaligned sequences [1]
# =====================================================================

kraken2_db: "/home/ja581385/genomics_core/references/kraken2/k2_standard"
# skip_kraken2: true


# =====================================================================
# CONTAMINANT REMOVAL (OPTIONAL)
# BBSplit removes reads mapping to contaminant genomes [1]
# =====================================================================

# bbsplit_fasta_list: "/path/to/bbsplit_fasta_list.txt"
# skip_bbsplit: true


# =====================================================================
# UMI OPTIONS (UNCOMMENT FOR UMI LIBRARIES)
# UMI extraction and deduplication with UMI-tools [1]
# =====================================================================

# with_umi: true
# umitools_extract_method: "string"
# umitools_bc_pattern: "NNNNNN"
# umi_discard_read: 0
# umitools_dedup_stats: true


# =====================================================================
# STRANDEDNESS
# Set per-sample in samplesheet. 'auto' recommended [1].
# =====================================================================

# seq_platform: "ILLUMINA"


# =====================================================================
# QC MODULE CONTROL
# All modules enabled by default [1]
# Uncomment to skip specific QC steps
# =====================================================================

# ---- Pre-alignment QC ----
# skip_fastqc: true

# ---- Post-alignment QC ----
# skip_rseqc: true
# skip_qualimap: true
# skip_dupradar: true
# skip_preseq: true
# skip_markduplicates: true
# skip_deseq2_qc: true

# ---- Coverage and assembly ----
# skip_bigwig: true
# skip_stringtie: true

# ---- Final aggregated report ----
# skip_multiqc: true


# =====================================================================
# OUTPUT OPTIONS
# =====================================================================

# Save intermediate alignment BAMs
save_align_intermeds: true

# Save pipeline-built reference indices — enable on first run
# save_reference: true

# Save unaligned reads
# save_unaligned: true

# Skip alignment for reprocessing previously aligned BAMs [1]
# skip_alignment: false


# =====================================================================
# MULTIQC REPORT
# Aggregated QC report across all pipeline steps [1]
# =====================================================================

multiqc_title: "RNA-seq QC Report - __PROJECT_ID__"
# multiqc_config: "multiqc_config.yaml"
