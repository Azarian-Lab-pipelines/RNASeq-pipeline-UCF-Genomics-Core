# =============================================================================
# Custom MultiQC Configuration for Genomics Core Facility
# Applied to nf-core/rnaseq MultiQC reports
#
# This config customizes the aggregated QC report that the pipeline
# generates across all steps: raw read QC, trimming, alignment,
# quantification, and post-alignment QC [1].
#
# Reference: https://multiqc.info/docs/getting_started/config/
#
# Placeholders __PROJECT_ID__, __PI_NAME__, __ORGANISM__, __ANALYST__,
# __DATE__ are replaced automatically by init_project.sh
# =============================================================================


# =====================================================================
# REPORT TITLE AND BRANDING
#
# Customize the report header text [2].
# Set intro_text to False to hide the default introduction sentence,
# or set it to a string to use your own text [2].
# =====================================================================

title: "RNA-seq Quality Control Report"
subtitle: "__PROJECT_ID__"
intro_text: >
  This report was generated by the UCF Genomics Core Facility
  using the nf-core/rnaseq pipeline (v3.23.0). It summarizes
  quality control metrics across all processing steps: raw read QC
  (FastQC), adapter trimming (Trim Galore), alignment (STAR),
  quantification (Salmon), and post-alignment QC (RSeQC, Qualimap,
  dupRadar, Preseq, DESeq2 PCA).

report_comment: >
  If you have questions about this report, please contact the
  Genomics Core Facility at ja581385@university.edu.


# =====================================================================
# CUSTOM LOGO
#
# Add the UCF logo to the top of every report [2].
# Only custom_logo is required. The URL makes the logo open a new
# browser tab, and the title sets mouse hover text [2].
# =====================================================================

custom_logo: "/home/ja581385/genomics_core/img/UCF_logo.png"
custom_logo_url: "https://www.ucf.edu"
custom_logo_title: "UCF Genomics Core Facility"
custom_logo_width: 200


# =====================================================================
# PROJECT-LEVEL INFORMATION
#
# Key:value pairs displayed in the report header [2].
# These provide at-a-glance project identification when reviewing
# or sharing reports.
# =====================================================================

report_header_info:
  - Project ID: "__PROJECT_ID__"
  - PI: "__PI_NAME__"
  - Organism: "__ORGANISM__"
  - Analyst: "__ANALYST__"
  - Date: "__DATE__"
  - Pipeline: "nf-core/rnaseq v3.23.0"
  - Aligner: "STAR → Salmon"
  - Facility: "UCF Genomics Core"
  - Contact: "ja581385@university.edu"


# =====================================================================
# REPORT DISPLAY OPTIONS
#
# Control whether analysis file paths and timestamps are shown [2].
# Disable paths when sharing reports externally for cleaner
# presentation and to avoid exposing internal directory structures [2].
# =====================================================================

show_analysis_paths: false
show_analysis_time: true


# =====================================================================
# MODULE DISPLAY ORDER
#
# Controls the order in which tool results appear in the report.
# Organized to follow the logical flow of the nf-core/rnaseq pipeline:
#   1. Raw read QC
#   2. Trimming
#   3. Alignment
#   4. Quantification
#   5. Alignment QC
#   6. Library complexity
#   7. Duplication
#
# The pipeline performs extensive quality control including FastQC,
# RSeQC, Qualimap, dupRadar, Preseq, and DESeq2 [1].
# =====================================================================

module_order:
  # Raw read quality
  - fastqc:
      name: "FastQC (Raw Reads)"
      path_filters:
        - "*_fastqc.zip"

  # Trimming results
  - cutadapt

  # Alignment statistics
  - star
  - hisat2

  # Quantification
  - salmon
  - rsem

  # Alignment processing
  - samtools
  - picard

  # Alignment QC
  - rseqc
  - qualimap

  # Library complexity and duplication
  - preseq
  - dupradar

  # Feature counting
  - featureCounts


# =====================================================================
# GENERAL STATISTICS TABLE
#
# Control which columns are visible by default in the general
# statistics table at the top of the report.
# Keeps the overview focused on the most informative metrics.
# =====================================================================

table_columns_visible:
  FastQC:
    percent_duplicates: true
    percent_gc: true
    avg_sequence_length: true
    percent_fails: false
    total_sequences: true
  STAR:
    uniquely_mapped_percent: true
    uniquely_mapped: true
    mismatch_rate: true
    multimapped_percent: true
  Salmon:
    percent_mapped: true
    num_mapped: true
  Samtools:
    mapped_passed: true
  Picard:
    PERCENT_DUPLICATION: true
  RSeQC:
    proper_pairs_percent: false


# =====================================================================
# SAMPLE NAME CLEANING
#
# Remove common suffixes from sample names so they appear cleaner
# in all plots and tables. MultiQC applies these patterns to strip
# unwanted extensions from displayed sample names.
# =====================================================================

extra_fn_clean_exts:
  - ".Aligned.sortedByCoord.out"
  - ".Aligned.toTranscriptome.out"
  - ".markDups"
  - ".sorted"
  - ".merged"
  - "_trimmed"
  - "_val_1"
  - "_val_2"
  - "_R1"
  - "_R2"
  - ".bam"
  - ".idxstats"
  - ".flagstat"
  - ".stats"

# Additional patterns to clean (regex supported)
fn_clean_exts:
  - type: "regex"
    pattern: "_S\\d+_L\\d+"
  - type: "regex"
    pattern: "_001$"


# =====================================================================
# PLOT CONFIGURATION
#
# For large projects (>50 samples), interactive plots can become
# slow and unresponsive. Force flat (static) images for better
# performance in large-scale reports.
# =====================================================================

# Uncomment for projects with >50 samples
# plots_force_flat: true
# plots_flat_numseries: 50

# Maximum number of samples to show in bar plots
# Keeps plots readable for large projects
max_table_rows: 500


# =====================================================================
# EXPORT SETTINGS
#
# Enable data export for downstream analysis.
# Creates a multiqc_data/ directory alongside the HTML report
# containing parsed data tables in various formats.
# =====================================================================

data_format: "tsv"
export_plots: true
